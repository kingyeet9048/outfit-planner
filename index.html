<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Outfit Planner</title>
  <meta name="description" content="Plan your trip outfits — offline, on any device.">
  <meta name="theme-color" content="#f7f8fb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Outfits">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <script>
    (function () {
      var localHosts = ['localhost', '127.0.0.1', '::1', '[::1]'];
      if (location.protocol === 'file:' || localHosts.indexOf(location.hostname) !== -1) return;

      var script = document.createElement('script');
      script.defer = true;
      script.src = 'https://cloud.umami.is/script.js';
      script.dataset.websiteId = '90836ef6-43d9-42e5-a6f2-d65ed08623a4';
      document.head.appendChild(script);
    }());
  </script>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/app.css">
  <script>
    // Browsers block ES modules and fetch from file:// — show a clear message instead of a blank page.
    if (location.protocol === 'file:') {
      document.addEventListener('DOMContentLoaded', function () {
        document.body.innerHTML = '<div style="max-width:560px;margin:48px auto;padding:24px;font-family:-apple-system,system-ui,sans-serif;line-height:1.5;color:#111;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1)"><h2 style="margin-bottom:8px">Open this app via HTTP, not file://</h2><p style="color:#555;margin-bottom:16px">Modern browsers block JavaScript modules and IndexedDB on <code>file://</code> URLs. Serve the folder locally first:</p><pre style="background:#f4f4f5;padding:12px;border-radius:8px;font-size:13px;overflow-x:auto"># From this folder, run either:\npython -m http.server 5173\n# or:\nnpx serve -p 5173</pre><p style="color:#555;margin:12px 0">Then open <code>http://127.0.0.1:5173/</code> in your browser.</p><p style="color:#555">When you publish to GitHub Pages, the URL will be <code>https://&lt;you&gt;.github.io/outfit-planner/</code> and everything works automatically.</p></div>';
      });
    }
  </script>
</head>
<body>
  <a class="skip-link" href="#view-root">Skip to content</a>

  <div class="app-shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="sidebar-brand">
        <span class="brand-mark" aria-hidden="true">OP</span>
        <span class="brand-text">Outfit Planner</span>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-foot">
        <button type="button" class="btn btn-ghost btn-sm" data-action="quick-export">
          <span aria-hidden="true">⇪</span> Export
        </button>
        <span class="version-tag">v1.0</span>
      </div>
    </aside>

    <div class="app-main">
      <div id="storage-banner" class="storage-banner" hidden></div>
      <header class="topbar" id="topbar"></header>
      <main id="view-root" tabindex="-1"></main>
    </div>

    <nav class="tabbar" id="tabbar" aria-label="Primary navigation"></nav>
  </div>

  <div id="modal-root" aria-live="polite"></div>
  <div id="toast-root" class="toast-root" role="status" aria-live="polite"></div>

  <template id="tpl-skeleton-row">
    <div class="skeleton-row">
      <div class="skeleton-thumb"></div>
      <div class="skeleton-lines">
        <div class="skeleton-line"></div>
        <div class="skeleton-line short"></div>
      </div>
    </div>
  </template>

  <script type="module" src="js/app.js"></script>
</body>
</html>
